<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf8f5; color: #2c2416; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
header { background: #2c2416; color: #faf8f5; padding: 2rem; text-align: center; }
header h1 { font-family: 'Noto Serif TC', serif; font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
header p { color: #c4972a; font-size: 0.9rem; }
.container { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
.shop-info { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
.info-item { font-size: 0.9rem; color: #9e8e7a; }
.info-item strong { display: block; color: #2c2416; font-size: 1rem; margin-bottom: 0.2rem; }
.section-title { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; margin-bottom: 1rem; color: #8b6914; border-left: 3px solid #8b6914; padding-left: 0.75rem; }
.calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.calendar-nav button { background: none; border: 1px solid #e8ddd0; border-radius: 8px; padding: 0.4rem 1rem; cursor: pointer; font-size: 1rem; color: #2c2416; }
.calendar-nav button:hover { background: #f0e8d8; }
.calendar-month { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 2rem; }
.calendar-header { text-align: center; font-size: 0.75rem; color: #9e8e7a; padding: 0.5rem 0; }
.calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; position: relative; }
.calendar-day:hover { background: #f0e8d8; border-color: #8b6914; }
.calendar-day.empty { cursor: default; background: none; border-color: transparent; }
.calendar-day.past { color: #9e8e7a; cursor: default; opacity: 0.4; }
.calendar-day.today { font-weight: 700; color: #8b6914; }
.calendar-day.selected { background: #8b6914; color: white; border-color: #8b6914; }
.calendar-day.has-slot::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: #4a7c59; }
.slots-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; min-height: 120px; }
.slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
.slot-btn { padding: 0.7rem; border-radius: 8px; border: 1.5px solid #e8ddd0; background: white; cursor: pointer; text-align: center; font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif; color: #2c2416; transition: all 0.15s; }
.slot-btn:hover:not(:disabled) { border-color: #4a7c59; background: #f0f8f3; }
.slot-btn.full { background: #fdf0ef; border-color: #f0c0bc; color: #c0392b; cursor: not-allowed; }
.slot-btn.selected { background: #4a7c59; border-color: #4a7c59; color: white; }
.slot-time { font-size: 0.9rem; font-weight: 500; }
.slot-status { font-size: 0.7rem; margin-top: 2px; opacity: 0.8; }
.no-slots { color: #9e8e7a; text-align: center; padding: 2rem; font-size: 0.9rem; }
.form-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: none; }
.form-section.visible { display: block; }
.form-selected-info { background: #f0e8d8; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; color: #8b6914; font-weight: 500; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; font-size: 0.85rem; color: #9e8e7a; margin-bottom: 0.4rem; }
.required { color: #c0392b; }
input, textarea { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e8ddd0; border-radius: 8px; font-size: 0.95rem; font-family: 'Noto Sans TC', sans-serif; background: white; color: #2c2416; outline: none; }
input:focus, textarea:focus { border-color: #8b6914; }
textarea { resize: vertical; min-height: 80px; }
.submit-btn { width: 100%; padding: 0.9rem; background: #8b6914; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; letter-spacing: 0.1em; cursor: pointer; }
.submit-btn:hover { background: #c4972a; }
.submit-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
.message { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; display: none; }
.message.success { background: #eafaf1; border: 1px solid #82c9a0; color: #2d7a4f; display: block; }
.message.error { background: #fdf0ef; border: 1px solid #f0c0bc; color: #c0392b; display: block; }
footer { text-align: center; padding: 2rem; color: #9e8e7a; font-size: 0.8rem; border-top: 1px solid #e8ddd0; }
.last-update { text-align: right; font-size: 0.75rem; color: #9e8e7a; margin-bottom: 1rem; }
/* 攜伴區塊 */
.companion-box {
  background: #fffbf2; border: 1px solid #f0c040;
  border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 1rem;
  overflow-x: hidden;  /* 防止手機版橫向溢出 */
}
.companion-note {
  color: #8b6914; font-size: 0.83rem; margin: 6px 0 10px;
  line-height: 1.5; word-break: break-word;
}
.slot-count-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px; font-size: 0.85rem;
  flex-wrap: wrap;  /* 手機版自動換行 */
  padding: 6px 4px; border-bottom: 1px solid #f0e8d8;
}
.slot-count-row:last-child { border-bottom: none; }
.slot-count-row input[type=number] {
  width: 60px; padding: 0.3rem 0.5rem;
  border: 1px solid #e8ddd0; border-radius: 6px; font-size: 0.9rem;
}
.slot-count-row input[type=checkbox] {
  width: 20px; height: 20px; flex-shrink: 0; cursor: pointer;
  accent-color: #4a7c59;
}
.slot-count-row label {
  flex: 1; min-width: 110px; cursor: pointer;
  color: #2c2416; font-weight: 500;
}
.slot-count-row .unit-lbl { color: #9e8e7a; font-size: 0.78rem; flex-shrink: 0; }
/* 查詢取消區塊 */
.cancel-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
.cancel-notice { background: #fff8e1; border: 1px solid #f0c040; border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1.2rem; font-size: 0.85rem; color: #7a6000; }
.cancel-btn { width: 100%; padding: 0.9rem; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; cursor: pointer; margin-top: 0.5rem; }
.cancel-btn:hover { background: #a93226; }
.cancel-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
.cancel-result { background: #faf8f5; border: 1px solid #e8ddd0; border-radius: 8px; padding: 1.2rem; margin-top: 1rem; display: none; }
.cancel-result.visible { display: block; }
.booking-detail { font-size: 0.95rem; line-height: 2; }
.booking-detail .label { color: #9e8e7a; }
.booking-detail .value { color: #2c2416; font-weight: 500; }
.confirm-cancel-btn { width: 100%; padding: 0.9rem; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; cursor: pointer; margin-top: 1rem; }
.confirm-cancel-btn:hover { background: #a93226; }
.confirm-cancel-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
/* 部分取消時段選擇 */
.partial-cancel-box { margin-top: 1rem; border-top: 1px solid #e8ddd0; padding-top: 1rem; }
.partial-cancel-box h4 { font-size: 0.95rem; color: #c0392b; margin-bottom: 0.7rem; }
.partial-slot-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
  padding: 6px 0; border-bottom: 1px solid #f0e8d8;
}
.partial-slot-row:last-child { border-bottom: none; }
.partial-slot-row input[type=checkbox] {
  width: 20px; height: 20px; flex-shrink: 0;
  cursor: pointer; accent-color: #c0392b;
}
.partial-slot-row label {
  flex: 1; min-width: 140px; font-size: 0.9rem; cursor: pointer;
}
.partial-slot-row input[type=number] {
  width: 65px; padding: 0.3rem 0.5rem;
  border: 1px solid #e8ddd0; border-radius: 6px;
}
.partial-slot-row span { font-size: 0.8rem; color: #9e8e7a; }
</style>
</head>
<body>
<header>
  <h1 id="shopName">推拿預約</h1>
  <p id="shopHours">載入中...</p>
</header>
<div class="container">
  <div class="shop-info">
    <div class="info-item"><strong id="infoAddress">-</strong>地址</div>
    <div class="info-item"><strong id="infoPhone">-</strong>電話</div>
    <div class="info-item"><strong id="infoHours">-</strong>營業時間</div>
  </div>
  <h2 class="section-title">選擇日期</h2>
  <div class="last-update" id="lastUpdate"></div>
  <div class="calendar-nav">
    <button onclick="changeMonth(-1)">&#8249; 上個月</button>
    <span class="calendar-month" id="calendarTitle"></span>
    <button onclick="changeMonth(1)">下個月 &#8250;</button>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <h2 class="section-title">可預約時段</h2>
  <div class="slots-section" id="slotsSection">
    <div class="no-slots">請先點選日期查看可用時段</div>
  </div>
  <div id="message" class="message"></div>
  <div class="form-section" id="formSection">
    <h2 class="section-title">填寫預約資料</h2>
    <div class="form-selected-info" id="selectedInfo"></div>
    <div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" id="name" placeholder="請輸入您的姓名" autocomplete="name"></div>
    <div class="form-group"><label>電話 <span class="required">*</span></label><input type="tel" id="phone" placeholder="請輸入聯絡電話" autocomplete="tel"></div>
    <div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="email" placeholder="預約結果將寄送至此信箱" autocomplete="email"></div>
    <div class="form-group"><label>Line ID（選填）</label><input type="text" id="lineId" placeholder="選填" autocomplete="off"></div>
    <div class="form-group"><label>症狀描述（選填）</label><textarea id="symptom" placeholder="請描述您的不適部位或需求..."></textarea></div>
    <!-- 攜伴區塊 -->
    <div class="form-group">
      <label>是否攜伴？</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.95rem">
          <input type="radio" name="withCompanion" value="no" checked onchange="toggleCompanion(this.value)"
                 style="width:18px;height:18px;flex-shrink:0;accent-color:#8b6914">
          <span>否，只有我一人</span>
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.95rem">
          <input type="radio" name="withCompanion" value="yes" onchange="toggleCompanion(this.value)"
                 style="width:18px;height:18px;flex-shrink:0;accent-color:#8b6914">
          <span>是，有攜伴</span>
        </label>
      </div>
    </div>
    <div id="companionSection" style="display:none">
      <div class="companion-box">
        <div class="form-group" style="margin-bottom:0.6rem">
          <label for="totalCount">共幾位（含您本人）<span class="required">*</span></label>
          <input type="number" id="totalCount" min="2" max="10" value="2" oninput="buildCompanionSlots()">
        </div>
        <div class="companion-note" id="companionNote"></div>
        <div id="companionSlotRows"></div>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitBooking()">送出預約申請</button>
  </div>
  <!-- 查詢／取消預約 -->
  <div class="cancel-section">
    <h2 class="section-title" style="color:#c0392b;border-left-color:#c0392b;">查詢 / 取消預約</h2>
    <div class="cancel-notice">
      ⚠️ 取消預約需輸入預約單號、姓名、電話及預約時段，四項資料須完全正確才可辦理。<br>
      預約單號請見確認 Email，格式為 <strong>LYC-日期-英數</strong>（例：LYC-20260508-A3K9）。
    </div>
    <div class="form-group"><label>預約單號 <span class="required">*</span></label><input type="text" id="cancelBookingId" placeholder="例：LYC-20260508-A3K9" autocomplete="off"></div>
    <div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" id="cancelName" placeholder="請輸入預約時填寫的姓名"></div>
    <div class="form-group"><label>電話 <span class="required">*</span></label><input type="tel" id="cancelPhone" placeholder="請輸入預約時填寫的電話"></div>
    <div class="form-group">
      <label>預約時段 <span class="required">*</span> <span style="font-size:0.8rem;color:#9e8e7a">（填第一個時段，例：17:00-18:30）</span></label>
      <input type="text" id="cancelTimeSlot" placeholder="例：17:00-18:30">
    </div>
    <button class="cancel-btn" id="cancelQueryBtn" onclick="queryBooking()">查詢預約</button>
    <div class="cancel-result" id="cancelResult">
      <div class="booking-detail" id="cancelBookingDetail"></div>
      <div class="partial-cancel-box" id="partialCancelBox" style="display:none">
        <h4>選擇要取消的時段（可選部分取消）</h4>
        <div id="partialSlotRows"></div>
        <label style="display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;
                    font-size:0.95rem;padding:8px 0;border-top:1px solid #e8ddd0">
          <input type="checkbox" id="cancelAllCheck" onchange="toggleCancelAll(this.checked)"
                 style="width:20px;height:20px;flex-shrink:0;accent-color:#c0392b">
          <span style="color:#c0392b;font-weight:500">整單全部取消</span>
        </label>
      </div>
      <button class="confirm-cancel-btn" id="confirmCancelBtn" onclick="confirmCancel()">確認送出取消申請</button>
    </div>
    <div id="cancelMessage" class="message" style="margin-top:1rem;"></div>
  </div>
</div>
<footer>
  預約送出後請留意 Email 信箱，店家確認後將寄送通知。<br>
  如需取消，請使用上方查詢取消功能，或點擊確認 Email 中的取消連結。
  <br><br><a href="index.html" style="color:#8b6914;">← 返回首頁</a>
</footer>
<script>
var SLOTS_JSON = "slots.json";
var APPS_SCRIPT_URL = "";
var slotsData = {};
var currentYear, currentMonth;
var selectedDate = null, selectedTime = null;
var foundCancelToken = "";
var foundBookingId   = "";
var foundSlotsArr    = [];
var companionSlotSelections = {};

fetch("site.json?t=" + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.apps_script_url) APPS_SCRIPT_URL = data.apps_script_url;
  })
  .catch(function(){})
  .finally(function(){
    // 取得 APPS_SCRIPT_URL 後再載入時段（讓 getSlotsLive 能用上）
    loadSlotsJson();
  });

window.onload = function() {
  var now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  // 不在這裡呼叫 loadSlotsJson(),等 site.json 載入後才呼叫,避免先用靜態檔再被即時檔覆蓋（閃爍）
};

function loadSlotsJson() {
  // 修正 Bug 3：先嘗試 GS 即時計算（後台沒開時也能扣除已預約名額）；
  // GS 失敗才退回 slots.json（GitHub 靜態檔，依賴後台 Python 上傳）
  function applyData(data, source){
    slotsData = data.slots || {};
    var shop  = data.shop  || {};
    if (shop.shop_name)    document.getElementById("shopName").textContent   = shop.shop_name;
    if (shop.shop_address) document.getElementById("infoAddress").textContent = shop.shop_address;
    if (shop.shop_phone)   document.getElementById("infoPhone").textContent   = shop.shop_phone;
    if (shop.shop_hours){
      document.getElementById("infoHours").textContent = shop.shop_hours;
      document.getElementById("shopHours").textContent = shop.shop_hours;
    }
    document.getElementById("lastUpdate").textContent = "資料更新時間：" + new Date().toLocaleTimeString("zh-TW") + (source ? "（" + source + "）" : "");
    renderCalendar();
    if (selectedDate) showSlots(selectedDate);
  }
  function fallbackStaticJson(){
    fetch(SLOTS_JSON + "?t=" + Date.now())
      .then(function(r){ if (!r.ok) throw new Error(); return r.json(); })
      .then(function(data){ applyData(data, "靜態"); })
      .catch(function(){ slotsData = {}; renderCalendar(); });
  }
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL + "?action=getSlotsLive&t=" + Date.now())
      .then(function(r){ if (!r.ok) throw new Error(); return r.json(); })
      .then(function(data){
        if (data && data._live && data.slots) applyData(data, "即時");
        else fallbackStaticJson();
      })
      .catch(fallbackStaticJson);
  } else {
    fallbackStaticJson();
  }
}

function renderCalendar() {
  var months = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById("calendarTitle").textContent = currentYear + " 年 " + months[currentMonth];
  var grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";
  ["日","一","二","三","四","五","六"].forEach(function(d){
    var el = document.createElement("div");
    el.className = "calendar-header"; el.textContent = d; grid.appendChild(el);
  });
  var firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  for (var i = 0; i < firstDay; i++){
    var empty = document.createElement("div");
    empty.className = "calendar-day empty"; grid.appendChild(empty);
  }
  for (var d = 1; d <= daysInMonth; d++){
    var dayEl  = document.createElement("div");
    dayEl.className = "calendar-day";
    dayEl.textContent = d;
    var dateStr = currentYear + "-" + String(currentMonth+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    var dayDate = new Date(currentYear, currentMonth, d);
    if (dayDate < today){
      dayEl.classList.add("past");
    } else {
      if (dayDate.getTime() === today.getTime()) dayEl.classList.add("today");
      if (selectedDate === dateStr) dayEl.classList.add("selected");
      if (slotsData[dateStr] && slotsData[dateStr].some(function(s){ return s.available; }))
        dayEl.classList.add("has-slot");
      (function(ds){ dayEl.onclick = function(){ selectDate(ds); }; })(dateStr);
    }
    grid.appendChild(dayEl);
  }
}

function changeMonth(dir){
  currentMonth += dir;
  if (currentMonth > 11){ currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function selectDate(dateStr){
  selectedDate = dateStr; selectedTime = null;
  renderCalendar(); showSlots(dateStr);
  document.getElementById("formSection").classList.remove("visible");
}

function showSlots(dateStr){
  var section = document.getElementById("slotsSection");
  var slots   = slotsData[dateStr];
  if (!slots || !slots.length){
    section.innerHTML = '<div class="no-slots">此日期暫無可預約時段</div>'; return;
  }
  var now = new Date();
  var todayStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  if (dateStr === todayStr){
    // 今日：過濾掉「開始時間已過」的時段（不等結束，只要開始時間 <= 現在就不能選）
    slots = slots.filter(function(s){
      var startStr = s.time.split("-")[0]; if (!startStr) return true;
      var ps = startStr.trim().split(":");
      var startTime = new Date();
      startTime.setHours(+ps[0], +ps[1], 0, 0);
      return startTime > now;  // 開始時間還沒到才顯示
    });
    if (!slots.length){ section.innerHTML = '<div class="no-slots">今日時段已全部結束</div>'; return; }
  }
  var html = '<div class="slots-grid">';
  slots.forEach(function(s){
    if (s.available){
      var sel = selectedTime === s.time ? " selected" : "";
      var rem = (s.remaining !== undefined && s.quota > 1) ? "可預約（剩 "+s.remaining+"/"+s.quota+" 位）" : "可預約";
      html += '<button class="slot-btn'+sel+'" onclick="selectSlot(\''+s.time+'\')">'+
        '<div class="slot-time">'+s.time+'</div>'+
        '<div class="slot-status">'+rem+'</div></button>';
    } else {
      html += '<button class="slot-btn full" disabled>'+
        '<div class="slot-time">'+s.time+'</div>'+
        '<div class="slot-status">已額滿</div></button>';
    }
  });
  html += '</div>';
  section.innerHTML = html;
}

function selectSlot(time){
  selectedTime = time;
  showSlots(selectedDate);
  var form = document.getElementById("formSection");
  form.classList.add("visible");
  updateSelectedInfo();
  companionSlotSelections = {};
  buildCompanionSlots();
  form.scrollIntoView({ behavior:"smooth" });
}

function updateSelectedInfo(){
  var info = "📅 " + selectedDate + "　⏰ " + selectedTime;
  if (document.querySelector('input[name="withCompanion"]:checked').value === "yes"){
    var extras = Object.keys(companionSlotSelections).filter(function(k){ return k !== selectedTime; });
    if (extras.length) info += "　+ " + extras.join("、");
  }
  document.getElementById("selectedInfo").textContent = info;
}

function toggleCompanion(val){
  document.getElementById("companionSection").style.display = val === "yes" ? "block" : "none";
  if (val === "yes") buildCompanionSlots();
}

function buildCompanionSlots(){
  if (!selectedDate || !selectedTime) return;
  var totalCount = parseInt(document.getElementById("totalCount").value) || 2;
  var slots = slotsData[selectedDate] || [];
  var curSlot = null;
  for (var i = 0; i < slots.length; i++){
    if (slots[i].time === selectedTime){ curSlot = slots[i]; break; }
  }
  // 修正：用 remaining（實際剩餘）做為「此時段可容納人數上限」，而非 quota（總量）
  // 避免有人選擇剩 1 位的時段卻填 2 人也被判定為合理
  function effCap(s){
    // 預設取 remaining；若 remaining 未定義（舊資料）才退回 quota
    var r = (s && s.remaining !== undefined) ? parseInt(s.remaining) : parseInt(s && s.quota || 1);
    if (isNaN(r) || r < 0) r = 0;
    return r;
  }
  var curCap = curSlot ? effCap(curSlot) : 1;
  // 已選的主時段必須至少有 1 位才能進來這裡，這裡防呆
  if (curCap < 1) curCap = 1;
  var needSlots = Math.ceil(totalCount / curCap);
  var note = document.getElementById("companionNote");
  var rowsDiv = document.getElementById("companionSlotRows");
  // 攜伴時段也過濾今日已過的時段
  var now_c = new Date();
  var todayStr_c = now_c.getFullYear()+"-"+String(now_c.getMonth()+1).padStart(2,"0")+"-"+String(now_c.getDate()).padStart(2,"0");
  var avail = slots.filter(function(s){
    if (!s.available) return false;
    if (effCap(s) < 1) return false;  // 剩餘 0 不顯示
    if (selectedDate === todayStr_c){
      var startStr = s.time.split("-")[0];
      if (startStr){
        var ps = startStr.trim().split(":");
        var st = new Date(); st.setHours(+ps[0],+ps[1],0,0);
        return st > now_c;
      }
    }
    return true;
  });
  if (needSlots === 1){
    note.textContent = "✅ 此時段剩 " + curCap + " 位，可容納 " + totalCount + " 人。";
    rowsDiv.innerHTML = "";
    companionSlotSelections = {};
    // 主時段預設帶 totalCount，且不可超過 curCap
    companionSlotSelections[selectedTime] = Math.min(totalCount, curCap);
    updateSelectedInfo(); return;
  }
  note.textContent = "⚠️ 總計 " + totalCount + " 人，此時段只剩 " + curCap + " 位，需再選其他時段，各時段人數合計必須等於 " + totalCount + " 人。";
  rowsDiv.innerHTML = "";
  if (!companionSlotSelections[selectedTime]) companionSlotSelections[selectedTime] = curCap;
  avail.forEach(function(s){
    var isMain = s.time === selectedTime;
    var cap = effCap(s);
    var row = document.createElement("div");
    row.className = "slot-count-row";
    var chk = document.createElement("input");
    chk.type = "checkbox";
    chk.checked = isMain || (companionSlotSelections[s.time] !== undefined);
    chk.disabled = isMain;
    var lbl = document.createElement("label");
    lbl.textContent = s.time + (isMain ? "（已選）" : "");
    lbl.style.cssText = "font-size:0.9rem;min-width:120px;cursor:pointer";
    var cnt = document.createElement("input");
    cnt.type = "number"; cnt.min = 1; cnt.max = cap;
    // 確保預設值不超過該時段剩餘
    var defVal = companionSlotSelections[s.time];
    if (defVal === undefined) defVal = isMain ? cap : 1;
    if (defVal > cap) defVal = cap;
    cnt.value = defVal;
    if (companionSlotSelections[s.time] !== undefined) companionSlotSelections[s.time] = defVal;
    cnt.style.width = "70px";
    cnt.disabled = !chk.checked;
    var unitLbl = document.createElement("span");
    unitLbl.textContent = "人　(剩 " + cap + " 位)";
    unitLbl.style.cssText = "font-size:0.8rem;color:#9e8e7a";
    chk.onchange = (function(_s, _cnt, _cap){
      return function(){
        if (this.checked){
          var v = parseInt(_cnt.value)||1;
          if (v > _cap) { v = _cap; _cnt.value = _cap; }
          companionSlotSelections[_s.time] = v;
          _cnt.disabled=false;
        } else {
          delete companionSlotSelections[_s.time];
          _cnt.disabled=true;
        }
        validateCompanionTotal(totalCount);
      };
    })(s, cnt, cap);
    cnt.oninput = (function(_s, _cap){
      return function(){
        var v = parseInt(this.value)||1;
        if (v > _cap){ v = _cap; this.value = _cap; }
        if (v < 1){ v = 1; this.value = 1; }
        companionSlotSelections[_s.time] = v;
        validateCompanionTotal(totalCount);
      };
    })(s, cap);
    row.appendChild(chk); row.appendChild(lbl); row.appendChild(cnt); row.appendChild(unitLbl);
    rowsDiv.appendChild(row);
  });
  validateCompanionTotal(totalCount);
  updateSelectedInfo();
}

function validateCompanionTotal(totalCount){
  var sum = 0;
  var overflow = false;
  Object.keys(companionSlotSelections).forEach(function(t){
    var v = parseInt(companionSlotSelections[t])||0;
    sum += v;
    // 再次比對該時段剩餘
    var slots = slotsData[selectedDate] || [];
    for (var i = 0; i < slots.length; i++){
      if (slots[i].time === t){
        var cap = (slots[i].remaining !== undefined) ? parseInt(slots[i].remaining) : parseInt(slots[i].quota || 1);
        if (v > cap) overflow = true;
        break;
      }
    }
  });
  var note = document.getElementById("companionNote");
  if (overflow){
    note.textContent = "❌ 有時段人數超過該時段剩餘名額，請修正！";
    note.style.color = "#c0392b";
  } else if (sum !== totalCount){
    note.textContent = "⚠️ 各時段合計 " + sum + " 人，必須等於 " + totalCount + " 人！";
    note.style.color = "#c0392b";
  } else {
    note.textContent = "✅ 合計 " + sum + " 人，符合！";
    note.style.color = "#2d7a4f";
  }
}

// ── 送出預約（優先 POST，fallback GET）──
function submitBooking(){
  var name    = document.getElementById("name").value.trim();
  var phone   = document.getElementById("phone").value.trim().replace(/\s/g,"");
  if (phone && !phone.startsWith("0")) phone = "0" + phone;
  var email   = document.getElementById("email").value.trim();
  var lineId  = document.getElementById("lineId").value.trim();
  var symptom = document.getElementById("symptom").value.trim();
  if (!name || !phone || !email){ showMessage("請填寫必填欄位（姓名、電話、Email）","error"); return; }
  if (!selectedDate || !selectedTime){ showMessage("請先選擇日期和時段","error"); return; }
  var withComp   = document.querySelector('input[name="withCompanion"]:checked').value;
  var slotsArr   = [];
  var totalCount = 1;
  if (withComp === "yes"){
    totalCount = parseInt(document.getElementById("totalCount").value) || 2;
    var sum = 0;
    Object.values(companionSlotSelections).forEach(function(v){ sum += parseInt(v)||0; });
    if (sum !== totalCount){ showMessage("各時段人數合計（"+sum+"）不等於總人數（"+totalCount+"），請修正","error"); return; }
    // 最終防呆：每個選擇的時段人數不能超過該時段剩餘
    var overflowTime = "";
    var slotsArrCheck = slotsData[selectedDate] || [];
    Object.keys(companionSlotSelections).forEach(function(t){
      var v = parseInt(companionSlotSelections[t])||0;
      for (var i = 0; i < slotsArrCheck.length; i++){
        if (slotsArrCheck[i].time === t){
          var cap = (slotsArrCheck[i].remaining !== undefined) ? parseInt(slotsArrCheck[i].remaining) : parseInt(slotsArrCheck[i].quota || 1);
          if (v > cap) overflowTime = t + "（剩 " + cap + " 位，您填 " + v + "）";
          break;
        }
      }
    });
    if (overflowTime){ showMessage("時段「"+overflowTime+"」超過剩餘名額，請修正","error"); return; }
    var times = Object.keys(companionSlotSelections).sort();
    times.forEach(function(t){ slotsArr.push({ date: selectedDate, time: t, count: parseInt(companionSlotSelections[t])||1 }); });
  } else {
    totalCount = 1;
    slotsArr = [{ date: selectedDate, time: selectedTime, count: 1 }];
  }
  var btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "送出中...";
  var payload = { action:"addBooking", name:name, phone:phone, email:email, lineId:lineId,
    date:selectedDate, time:selectedTime, symptom:symptom,
    slots:JSON.stringify(slotsArr), totalCount:totalCount };
  var _submitDone = false;
  function handleOk(data){
    if (_submitDone) return;
    _submitDone = true;
    if (data.status === "ok"){
      showMessage("✅ 預約申請已送出！請留意 Email 信箱，確認信將附上預約單號。","success");
      document.getElementById("formSection").classList.remove("visible");
      ["name","phone","email","lineId","symptom"].forEach(function(id){ document.getElementById(id).value=""; });
      document.querySelector('input[name="withCompanion"][value="no"]').checked = true;
      document.getElementById("companionSection").style.display = "none";
      companionSlotSelections = {}; selectedDate = null; selectedTime = null;
      renderCalendar(); loadSlotsJson();
    } else {
      // 顯示伺服器回傳的具體錯誤訊息（如容量不足）
      showMessage(data.message || "送出失敗，請稍後再試。","error");
      btn.disabled = false; btn.textContent = "送出預約申請";
      // 容量不足時自動刷新時段資料,讓使用者看到最新狀態
      loadSlotsJson();
    }
  }
  fetch(APPS_SCRIPT_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"application/json"} })
    .then(function(r){ return r.json(); }).then(handleOk)
    .catch(function(){
      if (_submitDone) return;
      var params = "?action=addBooking&name="+encodeURIComponent(name)+"&phone="+encodeURIComponent(phone)+
        "&email="+encodeURIComponent(email)+"&lineId="+encodeURIComponent(lineId)+
        "&date="+encodeURIComponent(selectedDate)+"&time="+encodeURIComponent(selectedTime)+
        "&symptom="+encodeURIComponent(symptom)+"&slots="+encodeURIComponent(JSON.stringify(slotsArr))+
        "&totalCount="+totalCount;
      fetch(APPS_SCRIPT_URL + params).then(function(r){ return r.json(); }).then(handleOk)
        .catch(function(){
          if (_submitDone) return;
          showMessage("連線失敗，請稍後再試。","error"); btn.disabled=false; btn.textContent="送出預約申請";
        });
    });
}

function showMessage(text, type){
  var el = document.getElementById("message");
  el.textContent = text; el.className = "message " + type;
  el.scrollIntoView({ behavior:"smooth" });
  if (type === "error") setTimeout(function(){ el.className = "message"; }, 6000);
}

// ── 查詢取消 ──
function showCancelMessage(text, type){
  var el = document.getElementById("cancelMessage");
  el.textContent = text; el.className = "message " + type;
  if (type === "error") setTimeout(function(){ el.className = "message"; }, 6000);
}

function queryBooking(){
  var bookingId = document.getElementById("cancelBookingId").value.trim().toUpperCase();
  var name      = document.getElementById("cancelName").value.trim();
  var phone     = document.getElementById("cancelPhone").value.trim();
  var timeSlot  = document.getElementById("cancelTimeSlot").value.trim();
  if (!bookingId || !name || !phone || !timeSlot){ showCancelMessage("請填寫所有查詢欄位","error"); return; }
  var btn = document.getElementById("cancelQueryBtn");
  btn.disabled = true; btn.textContent = "查詢中...";
  document.getElementById("cancelResult").classList.remove("visible");
  fetch(APPS_SCRIPT_URL + "?action=getBookingById&booking_id=" + encodeURIComponent(bookingId))
    .then(function(r){ return r.json(); })
    .then(function(data){
      btn.disabled = false; btn.textContent = "查詢預約";
      if (!data || data.status === "not_found"){ showCancelMessage("查無此預約單號，請確認後再試。","error"); return; }
      // 四項驗證
      var nameMatch  = data.name && data.name.trim() === name;
      var normPhone  = phone.replace(/[-\s]/g,"");
      var dataPhone  = (data.phone||"").toString().replace(/[-\s]/g,"");
      var phoneMatch = dataPhone === normPhone;
      var timeMatch  = false;
      try {
        var sArr = JSON.parse(data.slots || "[]");
        for (var i = 0; i < sArr.length; i++){ if (sArr[i].time && sArr[i].time.trim() === timeSlot){ timeMatch=true; break; } }
      } catch(ex){}
      if (!timeMatch && data.time && data.time.trim() === timeSlot) timeMatch = true;
      if (!nameMatch || !phoneMatch || !timeMatch){ showCancelMessage("資料驗證失敗，請確認姓名、電話及時段是否正確。","error"); return; }
      if (data.status === "已取消" || data.status === "已拒絕"){ showCancelMessage("此預約狀態為「"+data.status+"」，無需再次取消。","error"); return; }
      foundCancelToken = data.cancel_token || "";
      foundBookingId   = data.booking_id  || bookingId;
      foundSlotsArr = [];
      try { foundSlotsArr = JSON.parse(data.slots || "[]"); } catch(ex){}
      // 顯示預約資料
      var slotsHtml = "";
      if (foundSlotsArr.length > 1){
        slotsHtml = "<div><span class='label'>時段明細：</span><br>";
        foundSlotsArr.forEach(function(s){ slotsHtml += "&nbsp;&nbsp;" + s.date + " " + s.time + "（" + s.count + "人）<br>"; });
        slotsHtml += "</div>";
      } else {
        slotsHtml = "<div><span class='label'>時段：</span><span class='value'>" + timeSlot + "</span></div>";
      }
      // 清理日期 ISO 格式
      var _dispDate = (data.date||"").toString();
      if (_dispDate.indexOf("T") >= 0) _dispDate = _dispDate.split("T")[0];
      document.getElementById("cancelBookingDetail").innerHTML =
        "<div class='booking-detail'>" +
        "<div><span class='label'>預約單號：</span><span class='value'>" + foundBookingId + "</span></div>" +
        "<div><span class='label'>姓名：</span><span class='value'>" + data.name + "</span></div>" +
        "<div><span class='label'>日期：</span><span class='value'>" + _dispDate + "</span></div>" +
        slotsHtml +
        "<div><span class='label'>狀態：</span><span class='value'>" + data.status + "</span></div>" +
        "</div>";
      var partialBox = document.getElementById("partialCancelBox");
      var rowsDiv    = document.getElementById("partialSlotRows");
      rowsDiv.innerHTML = "";
      if (foundSlotsArr.length > 1){
        partialBox.style.display = "block";
        document.getElementById("cancelAllCheck").checked = false;
        foundSlotsArr.forEach(function(s){
          var row = document.createElement("div"); row.className = "partial-slot-row";
          var chk = document.createElement("input"); chk.type="checkbox"; chk.checked=true;
          chk.dataset.time = s.time; chk.id = "pchk_"+s.time.replace(/[:\-]/g,"");
          var lbl = document.createElement("label"); lbl.htmlFor=chk.id;
          lbl.textContent = s.date + " " + s.time; lbl.style.cssText="font-size:0.9rem;cursor:pointer;min-width:160px";
          var cnt = document.createElement("input"); cnt.type="number"; cnt.min=1; cnt.max=s.count; cnt.value=s.count;
          cnt.id="pcnt_"+s.time.replace(/[:\-]/g,""); cnt.dataset.maxCount=s.count;
          var unitLbl = document.createElement("span"); unitLbl.textContent="/ "+s.count+" 人";
          unitLbl.style.cssText="font-size:0.8rem;color:#9e8e7a";
          row.appendChild(chk); row.appendChild(lbl); row.appendChild(cnt); row.appendChild(unitLbl);
          rowsDiv.appendChild(row);
        });
      } else { partialBox.style.display="none"; }
      document.getElementById("cancelResult").classList.add("visible");
    })
    .catch(function(){ btn.disabled=false; btn.textContent="查詢預約"; showCancelMessage("連線失敗，請稍後再試。","error"); });
}

function toggleCancelAll(checked){
  document.querySelectorAll("#partialSlotRows input[type=checkbox]").forEach(function(c){ c.checked=checked; });
  if (checked){
    foundSlotsArr.forEach(function(s){
      var cnt = document.getElementById("pcnt_"+s.time.replace(/[:\-]/g,""));
      if (cnt) cnt.value = s.count;
    });
  }
}

function confirmCancel(){
  var cancelSlots = [];
  var partialBox = document.getElementById("partialCancelBox");
  if (partialBox.style.display !== "none" && foundSlotsArr.length > 1){
    document.querySelectorAll("#partialSlotRows input[type=checkbox]").forEach(function(chk){
      if (chk.checked){
        var t = chk.dataset.time;
        var cnt = document.getElementById("pcnt_"+t.replace(/[:\-]/g,""));
        cancelSlots.push({ time:t, count:cnt?(parseInt(cnt.value)||1):1 });
      }
    });
    if (!cancelSlots.length){ showCancelMessage("請至少選擇一個要取消的時段","error"); return; }
  } else {
    foundSlotsArr.forEach(function(s){ cancelSlots.push({ time:s.time, count:s.count }); });
  }
  if (!confirm("確定要取消此預約嗎？")) return;
  var btn = document.getElementById("confirmCancelBtn");
  btn.disabled = true; btn.textContent = "處理中...";
  var payload = { action:"requestCancel", booking_id:foundBookingId, cancelSlots:cancelSlots };
  if (foundCancelToken) payload.token = foundCancelToken;
  var _done = false;  // 防止 POST 成功後又被 fallback GET 重複觸發
  function handleResult(data){
    if (_done) return;
    _done = true;
    if (data.status === "ok"){
      document.getElementById("cancelResult").classList.remove("visible");
      showCancelMessage("⏳ 取消申請已送出，需等待店家審核，結果將以 Email 通知您，請留意信箱。","success");
      ["cancelBookingId","cancelName","cancelPhone","cancelTimeSlot"].forEach(function(id){ document.getElementById(id).value=""; });
      foundCancelToken=""; foundBookingId=""; foundSlotsArr=[];
    } else {
      showCancelMessage(data.message||"取消失敗，請聯繫店家。","error");
      btn.disabled=false; btn.textContent="確認送出取消申請";
    }
  }
  fetch(APPS_SCRIPT_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"application/json"} })
    .then(function(r){ return r.json(); }).then(handleResult)
    .catch(function(){
      if (_done) return;
      var url = APPS_SCRIPT_URL + "?action=requestCancel&booking_id="+encodeURIComponent(foundBookingId);
      if (foundCancelToken) url += "&token="+encodeURIComponent(foundCancelToken);
      fetch(url).then(function(r){ return r.json(); }).then(handleResult)
        .catch(function(){
          if (_done) return;
          showCancelMessage("連線失敗，請稍後再試。","error"); btn.disabled=false; btn.textContent="確認送出取消申請";
        });
    });
}

setInterval(loadSlotsJson, 30000);
</script>
