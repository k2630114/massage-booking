<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf8f5; color: #2c2416; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
header { background: #2c2416; color: #faf8f5; padding: 2rem; text-align: center; }
header h1 { font-family: 'Noto Serif TC', serif; font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
header p { color: #c4972a; font-size: 0.9rem; }
.container { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
.shop-info { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
.info-item { font-size: 0.9rem; color: #9e8e7a; }
.info-item strong { display: block; color: #2c2416; font-size: 1rem; margin-bottom: 0.2rem; }
.section-title { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; margin-bottom: 1rem; color: #8b6914; border-left: 3px solid #8b6914; padding-left: 0.75rem; }
.calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.calendar-nav button { background: none; border: 1px solid #e8ddd0; border-radius: 8px; padding: 0.4rem 1rem; cursor: pointer; font-size: 1rem; color: #2c2416; }
.calendar-nav button:hover { background: #f0e8d8; }
.calendar-month { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 600; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 2rem; }
.calendar-header { text-align: center; font-size: 0.75rem; color: #9e8e7a; padding: 0.5rem 0; }
.calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; position: relative; }
.calendar-day:hover { background: #f0e8d8; border-color: #8b6914; }
.calendar-day.empty { cursor: default; background: none; border-color: transparent; }
.calendar-day.past { color: #9e8e7a; cursor: default; opacity: 0.4; }
.calendar-day.today { font-weight: 700; color: #8b6914; }
.calendar-day.selected { background: #8b6914; color: white; border-color: #8b6914; }
.calendar-day.has-slot::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: #4a7c59; }
.slots-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; min-height: 120px; }
.slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
.slot-btn { padding: 0.7rem; border-radius: 8px; border: 1.5px solid #e8ddd0; background: white; cursor: pointer; text-align: center; font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif; color: #2c2416; transition: all 0.15s; }
.slot-btn:hover { border-color: #4a7c59; background: #f0f8f3; }
.slot-btn.full { background: #fdf0ef; border-color: #f0c0bc; color: #c0392b; cursor: not-allowed; }
.slot-btn.selected { background: #4a7c59; border-color: #4a7c59; color: white; }
.slot-time { font-size: 0.9rem; font-weight: 500; }
.slot-status { font-size: 0.7rem; margin-top: 2px; opacity: 0.8; }
.no-slots { color: #9e8e7a; text-align: center; padding: 2rem; font-size: 0.9rem; }
.form-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: none; }
.form-section.visible { display: block; }
.form-selected-info { background: #f0e8d8; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; color: #8b6914; font-weight: 500; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; font-size: 0.85rem; color: #9e8e7a; margin-bottom: 0.4rem; }
.required { color: #c0392b; }
input, textarea { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e8ddd0; border-radius: 8px; font-size: 0.95rem; font-family: 'Noto Sans TC', sans-serif; background: white; color: #2c2416; outline: none; }
input:focus, textarea:focus { border-color: #8b6914; }
textarea { resize: vertical; min-height: 80px; }
.line-notice { background: #f0fff4; border: 1px solid #82c9a0; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; text-align: center; }
.line-notice p { font-size: 0.85rem; color: #2d7a4f; margin-bottom: 0.5rem; }
.line-notice img { max-width: 120px; margin: 0 auto; display: block; }
.submit-btn { width: 100%; padding: 0.9rem; background: #8b6914; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; letter-spacing: 0.1em; cursor: pointer; }
.submit-btn:hover { background: #c4972a; }
.submit-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
.message { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; display: none; }
.message.success { background: #eafaf1; border: 1px solid #82c9a0; color: #2d7a4f; display: block; }
.message.error { background: #fdf0ef; border: 1px solid #f0c0bc; color: #c0392b; display: block; }
footer { text-align: center; padding: 2rem; color: #9e8e7a; font-size: 0.8rem; border-top: 1px solid #e8ddd0; }
.last-update { text-align: right; font-size: 0.75rem; color: #9e8e7a; margin-bottom: 1rem; }

/* 查詢取消區塊 */
.cancel-section { background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
.cancel-section .section-title { color: #c0392b; border-left-color: #c0392b; }
.cancel-notice { background: #fff8e1; border: 1px solid #f0c040; border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1.2rem; font-size: 0.85rem; color: #7a6000; }
.cancel-btn { width: 100%; padding: 0.9rem; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; cursor: pointer; margin-top: 0.5rem; }
.cancel-btn:hover { background: #a93226; }
.cancel-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
.cancel-result { background: #faf8f5; border: 1px solid #e8ddd0; border-radius: 8px; padding: 1.2rem; margin-top: 1rem; display: none; }
.cancel-result.visible { display: block; }
.booking-detail { font-size: 0.95rem; line-height: 2; }
.booking-detail .label { color: #9e8e7a; }
.booking-detail .value { color: #2c2416; font-weight: 500; }
.confirm-cancel-btn { width: 100%; padding: 0.9rem; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Serif TC', serif; cursor: pointer; margin-top: 1rem; }
.confirm-cancel-btn:hover { background: #a93226; }
.confirm-cancel-btn:disabled { background: #9e8e7a; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1 id="shopName">推拿預約</h1>
  <p id="shopHours">載入中...</p>
</header>
<div class="container">
  <div class="shop-info">
    <div class="info-item"><strong id="infoAddress">-</strong>地址</div>
    <div class="info-item"><strong id="infoPhone">-</strong>電話</div>
    <div class="info-item"><strong id="infoHours">-</strong>營業時間</div>
  </div>

  <h2 class="section-title">選擇日期</h2>
  <div class="last-update" id="lastUpdate"></div>
  <div class="calendar-nav">
    <button onclick="changeMonth(-1)">&#8249; 上個月</button>
    <span class="calendar-month" id="calendarTitle"></span>
    <button onclick="changeMonth(1)">下個月 &#8250;</button>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <h2 class="section-title">可預約時段</h2>
  <div class="slots-section" id="slotsSection">
    <div class="no-slots">請先點選日期查看可用時段</div>
  </div>
  <div id="message" class="message"></div>
  <div class="form-section" id="formSection">
    <h2 class="section-title">填寫預約資料</h2>
    <div class="form-selected-info" id="selectedInfo"></div>
    <div class="form-group">
      <label>姓名 <span class="required">*</span></label>
      <input type="text" id="name" placeholder="請輸入您的姓名" autocomplete="name">
    </div>
    <div class="form-group">
      <label>電話 <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="請輸入聯絡電話" autocomplete="tel">
    </div>
    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" id="email" placeholder="預約結果將寄送至此信箱" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Line ID（選填）</label>
      <input type="text" id="lineId" placeholder="選填" autocomplete="off">
    </div>
    <div class="form-group">
      <label>症狀描述（選填）</label>
      <textarea id="symptom" placeholder="請描述您的不適部位或需求..."></textarea>
    </div>
    <div class="line-notice" id="lineNotice">
      <p>📱 加入官方 Line 可接收預約通知（建議加入）</p>
      <img id="lineQrImg" src="" alt="官方 Line QR Code" style="display:none">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitBooking()">送出預約申請</button>
  </div>

  <!-- 查詢／取消預約區塊 -->
  <div class="cancel-section">
    <h2 class="section-title" style="color:#c0392b;border-left-color:#c0392b;">查詢 / 取消預約</h2>
    <div class="cancel-notice">
      ⚠️ 取消預約需輸入預約單號、姓名、電話及預約時段，四項資料須完全正確才可辦理。<br>
      預約單號請見確認 Email，格式為 <strong>LYC-日期-英數</strong>（例：LYC-20260508-A3K9）。<br>
      電話請輸入預約時填寫的號碼（含開頭0）。
    </div>
    <div class="form-group">
      <label>預約單號 <span class="required">*</span></label>
      <input type="text" id="cancelBookingId" placeholder="例：LYC-20260508-A3K9" autocomplete="off">
    </div>
    <div class="form-group">
      <label>姓名 <span class="required">*</span></label>
      <input type="text" id="cancelName" placeholder="請輸入預約時填寫的姓名">
    </div>
    <div class="form-group">
      <label>電話 <span class="required">*</span></label>
      <input type="tel" id="cancelPhone" placeholder="請輸入預約時填寫的電話">
    </div>
    <div class="form-group">
      <label>預約時段 <span class="required">*</span></label>
      <input type="text" id="cancelTimeSlot" placeholder="例：17:00-18:30">
    </div>
    <button class="cancel-btn" id="cancelQueryBtn" onclick="queryBooking()">查詢預約</button>

    <div class="cancel-result" id="cancelResult">
      <div class="booking-detail" id="cancelBookingDetail"></div>
      <button class="confirm-cancel-btn" id="confirmCancelBtn" onclick="confirmCancel()">確認取消此預約</button>
    </div>
    <div id="cancelMessage" class="message" style="margin-top:1rem;"></div>
  </div>

</div>
<footer>
  預約送出後請留意 Email 信箱，店家確認後將寄送通知。<br>
  如需取消，請使用上方查詢取消功能，或點擊確認 Email 中的取消連結。
  <br><br>
  <a href="index.html" style="color:#8b6914;">← 返回首頁</a>
</footer>
<script>
var SLOTS_JSON = "slots.json";
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzv7x0sBpPsrh5yHpWwmerlvmNTsoHmdCyNtXuFtLxjehTPIkIyTvMwoj8qbNzvHNuIFg/exec";
var slotsData = {};
var currentYear, currentMonth;
var selectedDate = null, selectedTime = null;
var cancelToken = "";

// 讀取 site.json 取得 APPS_SCRIPT_URL
fetch("site.json?t=" + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.apps_script_url) APPS_SCRIPT_URL = data.apps_script_url;
  }).catch(function(){});

window.onload = function() {
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  loadSlotsJson();
};

function loadSlotsJson() {
  fetch(SLOTS_JSON + "?t=" + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error("not found");
      return r.json();
    })
    .then(function(data) {
      slotsData = data.slots || {};
      var shop = data.shop || {};
      if (shop.shop_name) document.getElementById("shopName").textContent = shop.shop_name;
      if (shop.shop_address) document.getElementById("infoAddress").textContent = shop.shop_address;
      if (shop.shop_phone) document.getElementById("infoPhone").textContent = shop.shop_phone;
      if (shop.shop_hours) {
        document.getElementById("infoHours").textContent = shop.shop_hours;
        document.getElementById("shopHours").textContent = shop.shop_hours;
      }
      if (shop.line_qr) {
        var img = document.getElementById("lineQrImg");
        img.src = shop.line_qr;
        img.style.display = "block";
      }
      document.getElementById("lastUpdate").textContent = "資料更新時間：" + new Date().toLocaleTimeString("zh-TW");
      renderCalendar();
      if (selectedDate) showSlots(selectedDate);
    })
    .catch(function() {
      slotsData = {};
      renderCalendar();
    });
}

function renderCalendar() {
  var months = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById("calendarTitle").textContent = currentYear + " 年 " + months[currentMonth];
  var grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";
  ["日","一","二","三","四","五","六"].forEach(function(d) {
    var el = document.createElement("div");
    el.className = "calendar-header";
    el.textContent = d;
    grid.appendChild(el);
  });
  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = new Date();
  today.setHours(0,0,0,0);
  for (var i = 0; i < firstDay; i++) {
    var empty = document.createElement("div");
    empty.className = "calendar-day empty";
    grid.appendChild(empty);
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var dayEl = document.createElement("div");
    dayEl.className = "calendar-day";
    dayEl.textContent = d;
    var dateStr = currentYear + "-" + String(currentMonth+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    var dayDate = new Date(currentYear, currentMonth, d);
    if (dayDate < today) {
      dayEl.classList.add("past");
    } else {
      if (dayDate.getTime() === today.getTime()) dayEl.classList.add("today");
      if (selectedDate === dateStr) dayEl.classList.add("selected");
      if (slotsData[dateStr] && slotsData[dateStr].some(function(s){ return s.available; })) {
        dayEl.classList.add("has-slot");
      }
      (function(ds) {
        dayEl.onclick = function() { selectDate(ds); };
      })(dateStr);
    }
    grid.appendChild(dayEl);
  }
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  selectedTime = null;
  renderCalendar();
  showSlots(dateStr);
  document.getElementById("formSection").classList.remove("visible");
}

function showSlots(dateStr) {
  var section = document.getElementById("slotsSection");
  var slots = slotsData[dateStr];
  if (!slots || slots.length === 0) {
    section.innerHTML = '<div class="no-slots">此日期暫無可預約時段</div>';
    return;
  }
  // 過濾已過去的時段
  var now = new Date();
  var todayStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  if (dateStr === todayStr) {
    slots = slots.filter(function(s) {
      var endTime = s.time.split("-")[1];
      if (!endTime) return true;
      var parts = endTime.split(":");
      var slotEnd = new Date();
      slotEnd.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
      return slotEnd > now;
    });
    if (slots.length === 0) {
      section.innerHTML = '<div class="no-slots">今日時段已全部結束</div>';
      return;
    }
  }
  var html = '<div class="slots-grid">';
  slots.forEach(function(s) {
    if (s.available) {
      html += '<button class="slot-btn' + (selectedTime===s.time?' selected':'') + '" onclick="selectSlot(\'' + s.time + '\')">' +
        '<div class="slot-time">' + s.time + '</div>' +
        '<div class="slot-status">' + (s.remaining !== undefined && s.quota > 1 ? '可預約（剩 ' + s.remaining + '/' + s.quota + ' 位）' : '可預約') + '</div></button>';
    } else {
      html += '<button class="slot-btn full" disabled>' +
        '<div class="slot-time">' + s.time + '</div>' +
        '<div class="slot-status">已額滿</div></button>';
    }
  });
  html += '</div>';
  section.innerHTML = html;
}

function selectSlot(time) {
  selectedTime = time;
  showSlots(selectedDate);
  var form = document.getElementById("formSection");
  form.classList.add("visible");
  document.getElementById("selectedInfo").textContent = "📅 " + selectedDate + "　⏰ " + time;
  form.scrollIntoView({ behavior: "smooth" });
}

function showMessage(text, type) {
  var el = document.getElementById("message");
  el.textContent = text;
  el.className = "message " + type;
  el.scrollIntoView({ behavior: "smooth" });
  if (type === "error") setTimeout(function() { el.className = "message"; }, 6000);
}

function submitBooking() {
  var name = document.getElementById("name").value.trim();
  var phone = document.getElementById("phone").value.trim().replace(/\s/g,"");
  if (phone && !phone.startsWith("0")) phone = "0" + phone;
  var email = document.getElementById("email").value.trim();
  var lineId = document.getElementById("lineId").value.trim();
  var symptom = document.getElementById("symptom").value.trim();
  if (!name || !phone || !email) { showMessage("請填寫必填欄位（姓名、電話、Email）", "error"); return; }
  if (!selectedDate || !selectedTime) { showMessage("請先選擇日期和時段", "error"); return; }
  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "送出中...";
  var params = "?action=addBooking" +
    "&name=" + encodeURIComponent(name) +
    "&phone=" + encodeURIComponent(phone) +
    "&email=" + encodeURIComponent(email) +
    "&lineId=" + encodeURIComponent(lineId) +
    "&date=" + encodeURIComponent(selectedDate) +
    "&time=" + encodeURIComponent(selectedTime) +
    "&symptom=" + encodeURIComponent(symptom);
  fetch(APPS_SCRIPT_URL + params)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "ok") {
        showMessage("✅ 預約申請已送出！請留意 Email 信箱，確認信將附上預約單號。", "success");
        document.getElementById("formSection").classList.remove("visible");
        ["name","phone","email","lineId","symptom"].forEach(function(id){ document.getElementById(id).value = ""; });
        selectedDate = null; selectedTime = null;
        renderCalendar();
        loadSlotsJson();
      } else {
        showMessage("送出失敗，請稍後再試。", "error");
        btn.disabled = false;
        btn.textContent = "送出預約申請";
      }
    })
    .catch(function() {
      showMessage("連線失敗，請稍後再試。", "error");
      btn.disabled = false;
      btn.textContent = "送出預約申請";
    });
}

// ── 查詢取消功能 ──
function showCancelMessage(text, type) {
  var el = document.getElementById("cancelMessage");
  el.textContent = text;
  el.className = "message " + type;
  if (type === "error") setTimeout(function(){ el.className = "message"; }, 6000);
}

function queryBooking() {
  var bookingId = document.getElementById("cancelBookingId").value.trim().toUpperCase();
  var name = document.getElementById("cancelName").value.trim();
  var phone = document.getElementById("cancelPhone").value.trim();
  var timeSlot = document.getElementById("cancelTimeSlot").value.trim();

  if (!bookingId || !name || !phone || !timeSlot) {
    showCancelMessage("請填寫所有查詢欄位", "error"); return;
  }

  var btn = document.getElementById("cancelQueryBtn");
  btn.disabled = true;
  btn.textContent = "查詢中...";
  document.getElementById("cancelResult").classList.remove("visible");
  document.getElementById("cancelMessage").className = "message";

  var url = APPS_SCRIPT_URL + "?action=getBookingById&booking_id=" + encodeURIComponent(bookingId);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = "查詢預約";
      if (!data || data.status === "not_found") {
        showCancelMessage("查無此預約單號，請確認後再試。", "error"); return;
      }
      // 驗證姓名、電話、時段
      var nameMatch = data.name && data.name.trim() === name;
      // 電話比對：去掉前導0和空白
      var normPhone = phone.replace(/[-\s]/g,'');
      var dataPhone = (data.phone||'').toString().replace(/[-\s]/g,'');
      var phoneMatch = dataPhone === normPhone;
      var timeMatch = data.time && data.time.toString().trim() === timeSlot;
      if (!nameMatch || !phoneMatch || !timeMatch) {
        showCancelMessage("資料驗證失敗，請確認姓名、電話及時段是否正確。", "error"); return;
      }
      if (data.status === "已取消" || data.status === "已拒絕") {
        showCancelMessage("此預約狀態為「" + data.status + "」，無需再次取消。", "error"); return;
      }
      // 顯示預約資料
      var detail = document.getElementById("cancelBookingDetail");
      detail.innerHTML =
        '<div class="booking-detail">' +
        '<div><span class="label">預約單號：</span><span class="value">' + data.booking_id + '</span></div>' +
        '<div><span class="label">姓名：</span><span class="value">' + data.name + '</span></div>' +
        '<div><span class="label">日期：</span><span class="value">' + data.date + '</span></div>' +
        '<div><span class="label">時段：</span><span class="value">' + data.time + '</span></div>' +
        '<div><span class="label">狀態：</span><span class="value">' + data.status + '</span></div>' +
        '</div>';
      cancelToken = data.booking_id;
      document.getElementById("cancelResult").classList.add("visible");
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = "查詢預約";
      showCancelMessage("連線失敗，請稍後再試。", "error");
    });
}

function confirmCancel() {
  if (!cancelToken) return;
  if (!confirm("確定要取消此預約嗎？")) return;
  var btn = document.getElementById("confirmCancelBtn");
  btn.disabled = true;
  btn.textContent = "處理中...";

  // 送出取消申請給 GS，讓 Python 判斷取消政策
  var url = APPS_SCRIPT_URL + "?action=requestCancel&booking_id=" + encodeURIComponent(cancelToken);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "ok") {
        document.getElementById("cancelResult").classList.remove("visible");
        var msg = data.need_review
          ? "⏳ 取消申請已送出，需等待店家審核，結果將以 Email 通知您，請留意信箱。"
          : "✅ 取消申請已成功，店家將以 Email 確認通知。";
        showCancelMessage(msg, "success");
        document.getElementById("cancelBookingId").value = "";
        document.getElementById("cancelName").value = "";
        document.getElementById("cancelPhone").value = "";
        document.getElementById("cancelTimeSlot").value = "";
        cancelToken = "";
      } else {
        showCancelMessage(data.message || "取消失敗，請聯繫店家。", "error");
        btn.disabled = false;
        btn.textContent = "確認取消此預約";
      }
    })
    .catch(function() {
      showCancelMessage("連線失敗，請稍後再試。", "error");
      btn.disabled = false;
      btn.textContent = "確認取消此預約";
    });
}

setInterval(loadSlotsJson, 5 * 60 * 1000);
</script>
