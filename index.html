<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --text: #2c2416;
    --accent: #8b6914;
    --accent-light: #c4972a;
    --muted: #9e8e7a;
    --card: #ffffff;
    --border: #e8ddd0;
    --available: #4a7c59;
    --booked: #c0392b;
    --hover: #f0e8d8;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans TC’, sans-serif;
min-height: 100vh;
}

header {
background: var(–text);
color: var(–bg);
padding: 2rem;
text-align: center;
}

header h1 {
font-family: ‘Noto Serif TC’, serif;
font-size: 2rem;
letter-spacing: 0.1em;
margin-bottom: 0.3rem;
}

header p {
color: var(–accent-light);
font-size: 0.9rem;
letter-spacing: 0.05em;
}

.container {
max-width: 860px;
margin: 0 auto;
padding: 2rem 1rem;
}

/* 店家資訊 */
.shop-info {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 1.5rem;
margin-bottom: 2rem;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 1rem;
}

.info-item { font-size: 0.9rem; color: var(–muted); }
.info-item strong { display: block; color: var(–text); font-size: 1rem; margin-bottom: 0.2rem; }

/* 月曆 */
.section-title {
font-family: ‘Noto Serif TC’, serif;
font-size: 1.2rem;
margin-bottom: 1rem;
color: var(–accent);
border-left: 3px solid var(–accent);
padding-left: 0.75rem;
}

.calendar-nav {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 1rem;
}

.calendar-nav button {
background: none;
border: 1px solid var(–border);
border-radius: 8px;
padding: 0.4rem 1rem;
cursor: pointer;
font-size: 1rem;
color: var(–text);
transition: background 0.2s;
}

.calendar-nav button:hover { background: var(–hover); }

.calendar-month {
font-family: ‘Noto Serif TC’, serif;
font-size: 1.1rem;
font-weight: 600;
}

.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 4px;
margin-bottom: 2rem;
}

.calendar-header {
text-align: center;
font-size: 0.75rem;
color: var(–muted);
padding: 0.5rem 0;
font-weight: 500;
}

.calendar-day {
aspect-ratio: 1;
display: flex;
align-items: center;
justify-content: center;
border-radius: 8px;
font-size: 0.9rem;
cursor: pointer;
border: 1px solid transparent;
transition: all 0.15s;
position: relative;
}

.calendar-day:hover:not(.empty):not(.past) {
background: var(–hover);
border-color: var(–accent);
}

.calendar-day.empty { cursor: default; }
.calendar-day.past { color: var(–muted); cursor: default; opacity: 0.4; }
.calendar-day.today { font-weight: 700; color: var(–accent); }

.calendar-day.selected {
background: var(–accent);
color: white;
border-color: var(–accent);
}

.calendar-day.has-slots::after {
content: ‘’;
position: absolute;
bottom: 4px;
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–available);
}

/* 時段 */
.slots-section {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 1.5rem;
margin-bottom: 2rem;
min-height: 120px;
}

.slots-date {
font-size: 0.9rem;
color: var(–muted);
margin-bottom: 1rem;
}

.slots-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
gap: 0.75rem;
}

.slot-btn {
padding: 0.7rem;
border-radius: 8px;
border: 1.5px solid var(–border);
background: white;
cursor: pointer;
text-align: center;
font-size: 0.9rem;
font-family: ‘Noto Sans TC’, sans-serif;
transition: all 0.15s;
color: var(–text);
}

.slot-btn:hover:not(.booked) {
border-color: var(–available);
background: #f0f8f3;
}

.slot-btn.booked {
background: #fdf0ef;
border-color: #f0c0bc;
color: var(–booked);
cursor: not-allowed;
font-size: 0.8rem;
}

.slot-btn.selected {
background: var(–available);
border-color: var(–available);
color: white;
}

.slot-status {
font-size: 0.7rem;
margin-top: 2px;
opacity: 0.8;
}

.no-slots {
color: var(–muted);
text-align: center;
padding: 2rem;
font-size: 0.9rem;
}

/* 表單 */
.form-section {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 1.5rem;
margin-bottom: 2rem;
display: none;
}

.form-section.visible { display: block; }

.form-selected-info {
background: var(–hover);
border-radius: 8px;
padding: 0.75rem 1rem;
margin-bottom: 1.5rem;
font-size: 0.9rem;
color: var(–accent);
font-weight: 500;
}

.form-group { margin-bottom: 1.2rem; }

label {
display: block;
font-size: 0.85rem;
color: var(–muted);
margin-bottom: 0.4rem;
}

label span.required { color: var(–booked); }

input, textarea {
width: 100%;
padding: 0.7rem 1rem;
border: 1.5px solid var(–border);
border-radius: 8px;
font-size: 0.95rem;
font-family: ‘Noto Sans TC’, sans-serif;
background: white;
color: var(–text);
transition: border-color 0.15s;
outline: none;
}

input:focus, textarea:focus { border-color: var(–accent); }

textarea { resize: vertical; min-height: 80px; }

.submit-btn {
width: 100%;
padding: 0.9rem;
background: var(–accent);
color: white;
border: none;
border-radius: 8px;
font-size: 1rem;
font-family: ‘Noto Serif TC’, serif;
letter-spacing: 0.1em;
cursor: pointer;
transition: background 0.2s;
}

.submit-btn:hover { background: var(–accent-light); }
.submit-btn:disabled { background: var(–muted); cursor: not-allowed; }

/* 成功/錯誤訊息 */
.message {
padding: 1rem 1.5rem;
border-radius: 8px;
margin-bottom: 1.5rem;
font-size: 0.95rem;
display: none;
}

.message.success {
background: #eafaf1;
border: 1px solid #82c9a0;
color: #2d7a4f;
display: block;
}

.message.error {
background: #fdf0ef;
border: 1px solid #f0c0bc;
color: var(–booked);
display: block;
}

.loading {
text-align: center;
color: var(–muted);
padding: 1.5rem;
font-size: 0.9rem;
}

footer {
text-align: center;
padding: 2rem;
color: var(–muted);
font-size: 0.8rem;
border-top: 1px solid var(–border);
}

@media (max-width: 500px) {
header h1 { font-size: 1.5rem; }
.calendar-day { font-size: 0.8rem; }
}
</style>

</head>
<body>

<header>
  <h1 id="shopName">推拿預約</h1>
  <p id="shopHours">載入中...</p>
</header>

<div class="container">

  <div class="shop-info">
    <div class="info-item">
      <strong id="infoAddress">-</strong>
      地址
    </div>
    <div class="info-item">
      <strong id="infoPhone">-</strong>
      電話
    </div>
    <div class="info-item">
      <strong id="infoHours">-</strong>
      營業時間
    </div>
  </div>

  <h2 class="section-title">選擇日期</h2>

  <div class="calendar-nav">
    <button onclick="changeMonth(-1)">&#8249; 上個月</button>
    <span class="calendar-month" id="calendarTitle"></span>
    <button onclick="changeMonth(1)">下個月 &#8250;</button>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <h2 class="section-title">可預約時段</h2>

  <div class="slots-section" id="slotsSection">
    <div class="no-slots">請先點選左側日期查看可用時段</div>
  </div>

  <div id="message" class="message"></div>

  <div class="form-section" id="formSection">
    <h2 class="section-title">填寫預約資料</h2>
    <div class="form-selected-info" id="selectedInfo"></div>

<div class="form-group">
  <label>姓名 <span class="required">*</span></label>
  <input type="text" id="name" placeholder="請輸入您的姓名">
</div>
<div class="form-group">
  <label>電話 <span class="required">*</span></label>
  <input type="tel" id="phone" placeholder="請輸入聯絡電話">
</div>
<div class="form-group">
  <label>Email <span class="required">*</span></label>
  <input type="email" id="email" placeholder="用於接收預約確認通知">
</div>
<div class="form-group">
  <label>Line ID（選填）</label>
  <input type="text" id="lineId" placeholder="填寫後可透過 Line 接收通知">
</div>
<div class="form-group">
  <label>症狀描述（選填）</label>
  <textarea id="symptom" placeholder="請描述您的不適部位或需求，例如：肩頸痠痛、腰背緊繃..."></textarea>
</div>

<button class="submit-btn" id="submitBtn" onclick="submitBooking()">送出預約申請</button>

  </div>

</div>

<footer>
  預約成功後，店家將於確認後通知您。如需取消請提前來電。
</footer>

<script>
  // ===== 設定你的 Apps Script 網址 =====
  var API_URL = "https://script.google.com/macros/s/AKfycbzv7x0sBpPsrh5yHpWwmerlvmNTsoHmdCyNtXuFtLxjehTPIkIyTvMwoj8qbNzvHNuIFg/exec";

  var currentYear, currentMonth;
  var selectedDate = null;
  var selectedTime = null;

  // 初始化
  window.onload = function() {
    var now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();
    loadShopInfo();
  };

  // 載入店家資訊
  function loadShopInfo() {
    fetch(API_URL + "?action=getShopInfo")
      .then(function(r){ return r.json(); })
      .then(function(info){
        if (info["店名"]) document.getElementById("shopName").textContent = info["店名"];
        if (info["地址"]) document.getElementById("infoAddress").textContent = info["地址"];
        if (info["電話"]) document.getElementById("infoPhone").textContent = info["電話"];
        if (info["營業時間"]) {
          document.getElementById("infoHours").textContent = info["營業時間"];
          document.getElementById("shopHours").textContent = info["營業時間"];
        }
      })
      .catch(function(){ });
  }

  // 渲染月曆
  function renderCalendar() {
    var months = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    document.getElementById("calendarTitle").textContent = currentYear + " 年 " + months[currentMonth];

    var grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    var days = ["日","一","二","三","四","五","六"];
    days.forEach(function(d){
      var el = document.createElement("div");
      el.className = "calendar-header";
      el.textContent = d;
      grid.appendChild(el);
    });

    var firstDay = new Date(currentYear, currentMonth, 1).getDay();
    var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    var today = new Date();
    today.setHours(0,0,0,0);

    for (var i = 0; i < firstDay; i++) {
      var empty = document.createElement("div");
      empty.className = "calendar-day empty"
