<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿養生館</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f5; --text: #2c2416; --accent: #8b6914;
  --accent-light: #c4972a; --muted: #9e8e7a;
  --card: #ffffff; --border: #e8ddd0;
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }

/* 音樂播放器（隱藏） */
#bgMusic { display: none; }

/* 頂部導覽 */
nav {
  background: #2c2416;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  font-family: 'Noto Serif TC', serif;
  color: #c4972a;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
}
.nav-links { display: flex; gap: 0; }
.nav-links a {
  color: #e6edf3;
  text-decoration: none;
  padding: 0 1.2rem;
  height: 60px;
  display: flex;
  align-items: center;
  font-size: 0.9rem;
  transition: background 0.2s, color 0.2s;
}
.nav-links a:hover { background: #3c3426; color: #c4972a; }

/* 英雄區塊 */
.hero {
  min-height: 85vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
  background: linear-gradient(135deg, #faf8f5 0%, #f0e8d8 100%);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(139,105,20,0.05) 0%, transparent 60%);
  pointer-events: none;
}
.hero-tag {
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 1.5rem;
  text-transform: uppercase;
}
.hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 1.5rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  font-size: 1.1rem;
  color: var(--muted);
  max-width: 500px;
  line-height: 1.8;
  margin-bottom: 3rem;
}
.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
.btn-primary {
  background: var(--accent);
  color: white;
  padding: 0.9rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  letter-spacing: 0.05em;
  transition: background 0.2s, transform 0.2s;
}
.btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); }
.btn-secondary {
  background: transparent;
  color: var(--accent);
  padding: 0.9rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1rem;
  border: 1.5px solid var(--accent);
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--accent); color: white; }

/* 服務區塊 */
section { padding: 5rem 2rem; }
.section-inner { max-width: 1000px; margin: 0 auto; }
.section-tag {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-align: center;
  margin-bottom: 0.5rem;
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 2rem;
  text-align: center;
  margin-bottom: 3rem;
  color: var(--text);
}
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.5rem;
}
.service-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.service-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(139,105,20,0.1); }
.service-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.service-name { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; margin-bottom: 0.5rem; }
.service-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

/* 價目表 */
.pricing-section { background: #f5f0e8; }
.pricing-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.pricing-table th {
  background: #2c2416;
  color: #c4972a;
  padding: 1rem 1.5rem;
  text-align: left;
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
}
.pricing-table td {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.pricing-table tr:last-child td { border-bottom: none; }
.pricing-table tr:hover td { background: #faf8f5; }
.price-tag { color: var(--accent); font-weight: 600; font-size: 1.05rem; }

/* 關於我們 */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}
.about-text h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
}
.about-text p {
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 1rem;
  font-size: 0.95rem;
}
.about-img {
  background: linear-gradient(135deg, #e8ddd0, #f5f0e8);
  border-radius: 16px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 0.9rem;
}

/* 聯絡資訊 */
.contact-section { background: #2c2416; color: #faf8f5; }
.contact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2rem;
}
.contact-item h3 {
  font-family: 'Noto Serif TC', serif;
  color: #c4972a;
  margin-bottom: 0.5rem;
  font-size: 1rem;
}
.contact-item p { color: #8b949e; font-size: 0.9rem; line-height: 1.7; }

/* 預約按鈕浮動 */
.booking-float {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--accent);
  color: white;
  padding: 0.9rem 1.8rem;
  border-radius: 50px;
  text-decoration: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  box-shadow: 0 4px 20px rgba(139,105,20,0.4);
  transition: all 0.2s;
  z-index: 99;
}
.booking-float:hover { background: var(--accent-light); transform: translateY(-2px); }

/* 音樂控制按鈕 */
.music-btn {
  position: fixed;
  bottom: 2rem;
  left: 2rem;
  background: #2c2416;
  color: #c4972a;
  border: 1px solid #c4972a;
  padding: 0.6rem 1rem;
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.85rem;
  z-index: 99;
  transition: all 0.2s;
}
.music-btn:hover { background: #3c3426; }

footer {
  background: #1a1208;
  color: #8b949e;
  text-align: center;
  padding: 2rem;
  font-size: 0.85rem;
}

@media (max-width: 700px) {
  .about-grid { grid-template-columns: 1fr; }
  nav .nav-links { display: none; }
}
</style>
</head>
<body>

<audio id="bgMusic" loop></audio>

<nav>
  <div class="nav-logo" id="navLogo">推拿養生館</div>
  <div class="nav-links">
    <a href="#services">服務項目</a>
    <a href="#pricing">價目表</a>
    <a href="#about">關於我們</a>
    <a href="#contact">聯絡我們</a>
    <a href="booking.html" style="color:#c4972a">線上預約</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-tag" id="heroTag">專業推拿養生</div>
  <h1 id="heroTitle">讓身體<span>回歸</span><br>最自然的狀態</h1>
  <p id="heroIntro">載入中...</p>
  <div class="hero-btns">
    <a href="booking.html" class="btn-primary">立即線上預約</a>
    <a href="#services" class="btn-secondary">了解服務項目</a>
  </div>
</section>

<section id="services">
  <div class="section-inner">
    <div class="section-tag">OUR SERVICES</div>
    <h2 class="section-title">服務項目</h2>
    <div class="services-grid" id="servicesGrid">
      <div class="service-card">
        <div class="service-icon">🌿</div>
        <div class="service-name">載入中...</div>
      </div>
    </div>
  </div>
</section>

<section id="pricing" class="pricing-section">
  <div class="section-inner">
    <div class="section-tag">PRICING</div>
    <h2 class="section-title">價目表</h2>
    <table class="pricing-table">
      <thead>
        <tr>
          <th>服務項目</th>
          <th>時間</th>
          <th>價格</th>
        </tr>
      </thead>
      <tbody id="pricingBody">
        <tr><td colspan="3" style="text-align:center;color:#9e8e7a">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<section id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div class="about-text">
        <h2>關於我們</h2>
        <p id="aboutText">載入中...</p>
        <a href="booking.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem">立即預約</a>
      </div>
      <div class="about-img" id="aboutImgBox">
        <p style="color:#aaa">（尚未上傳店家照片）</p>
      </div>
    </div>
  </div>
</section>

<section id="contact" class="contact-section">
  <div class="section-inner">
    <div class="section-tag" style="color:#c4972a">CONTACT US</div>
    <h2 class="section-title" style="color:#faf8f5">聯絡資訊</h2>
    <div class="contact-grid">
      <div class="contact-item">
        <h3>📍 地址</h3>
        <p id="contactAddress">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>📞 電話</h3>
        <p id="contactPhone">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>🕐 營業時間</h3>
        <p id="contactHours">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>📅 線上預約</h3>
        <p><a href="booking.html" style="color:#c4972a">點此前往預約系統</a></p>
      </div>
    </div>
  </div>
</section>

<footer id="footerText">© 推拿養生館 版權所有</footer>

<a href="booking.html" class="booking-float">📅 立即預約</a>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" style="display:none">🎵 音樂</button>

<script>
var siteData = {};
var musicPlaying = false;

window.onload = function() {
  loadSiteData();
};

function loadSiteData() {
  fetch("site.json?t=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      siteData = data;
      renderSite(data);
    })
    .catch(function() {
      // 沒有 site.json 時顯示預設內容
    });
}

function renderSite(data) {
  var name = data.shop_name || "推拿養生館";
  document.title = name;
  document.getElementById("navLogo").textContent = name;
  document.getElementById("heroTitle").innerHTML = name + "<br><span style='color:var(--accent)'>專業推拿養生</span>";

  if (data.shop_intro) {
    document.getElementById("heroIntro").textContent = data.shop_intro;
    document.getElementById("aboutText").textContent = data.shop_intro;
  }
  if (data.shop_address) document.getElementById("contactAddress").textContent = data.shop_address;
  if (data.shop_phone) document.getElementById("contactPhone").textContent = data.shop_phone;
  if (data.shop_hours) document.getElementById("contactHours").textContent = data.shop_hours;
  document.getElementById("footerText").textContent = "© " + name + " 版權所有";

  // 服務項目
  if (data.shop_services && data.shop_services.length > 0) {
    var icons = ["🌿","💆","🏥","✨","🌸","💪","🧘","🌙"];
    var grid = document.getElementById("servicesGrid");
    grid.innerHTML = "";
    data.shop_services.forEach(function(s, i) {
      var card = document.createElement("div");
      card.className = "service-card";
      card.innerHTML = '<div class="service-icon">' + (icons[i % icons.length]) + '</div>' +
                       '<div class="service-name">' + s + '</div>';
      grid.appendChild(card);
    });
  }

  // 價目表
  if (data.shop_pricing && data.shop_pricing.length > 0) {
    var tbody = document.getElementById("pricingBody");
    tbody.innerHTML = "";
    data.shop_pricing.forEach(function(p) {
      var tr = document.createElement("tr");
      tr.innerHTML = '<td>' + (p.name||"") + '</td>' +
                     '<td>' + (p.duration||"") + '</td>' +
                     '<td class="price-tag">' + (p.price||"") + '</td>';
      tbody.appendChild(tr);
    });
  }

  // 背景音樂
  if (data.shop_music) {
    var audio = document.getElementById("bgMusic");
    audio.src = data.shop_music;
    document.getElementById("musicBtn").style.display = "block";
  }

  // 店家圖片
  if (data.shop_images && data.shop_images.length > 0) {
    var box = document.getElementById("aboutImgBox");
    box.innerHTML = "";
    data.shop_images.forEach(function(url, i) {
      var img = document.createElement("img");
      img.src = url;
      img.alt = "店家照片 " + (i+1);
      img.style.cssText = "width:100%;border-radius:12px;margin-bottom:12px;object-fit:cover;max-height:320px;";
      box.appendChild(img);
    });
  }
}

function toggleMusic() {
  var audio = document.getElementById("bgMusic");
  var btn = document.getElementById("musicBtn");
  if (musicPlaying) {
    audio.pause();
    btn.textContent = "🎵 音樂";
    musicPlaying = false;
  } else {
    audio.play();
    btn.textContent = "⏸ 暫停";
    musicPlaying = true;
  }
}
</script>
</body>
</html>
