<!DOCTYPE html>
<html lang="zh-TW">
<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f5; --text: #2c2416; --accent: #8b6914;
  --accent-light: #c4972a; --muted: #9e8e7a;
  --card: #ffffff; --border: #e8ddd0;
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }

/* 音樂播放器（隱藏） */
#bgMusic { display: none; }

/* 頂部導覽 */
nav {
  background: #2c2416;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  font-family: 'Noto Serif TC', serif;
  color: #c4972a;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
}
.nav-links { display: flex; gap: 0; }
.nav-links a {
  color: #e6edf3;
  text-decoration: none;
  padding: 0 1.2rem;
  height: 60px;
  display: flex;
  align-items: center;
  font-size: 0.9rem;
  transition: background 0.2s, color 0.2s;
}
.nav-links a:hover { background: #3c3426; color: #c4972a; }

/* 英雄區塊 */
.hero {
  min-height: 85vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
  background: linear-gradient(135deg, #faf8f5 0%, #f0e8d8 100%);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(139,105,20,0.05) 0%, transparent 60%);
  pointer-events: none;
}
.hero-tag {
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 1.5rem;
  text-transform: uppercase;
}
.hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 1.5rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  font-size: 1.1rem;
  color: var(--muted);
  max-width: 500px;
  line-height: 1.8;
  margin-bottom: 3rem;
}
.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
.service-hint { font-size:0.75rem; color:var(--accent); margin-top:0.3rem; opacity:0.8; }
.btn-primary {
  background: var(--accent);
  color: white;
  padding: 0.9rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  letter-spacing: 0.05em;
  transition: background 0.2s, transform 0.2s;
}
.btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); }
.btn-secondary {
  background: transparent;
  color: var(--accent);
  padding: 0.9rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1rem;
  border: 1.5px solid var(--accent);
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--accent); color: white; }

/* 服務區塊 */
section { padding: 5rem 2rem; }
.section-inner { max-width: 1000px; margin: 0 auto; }
.section-tag {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-align: center;
  margin-bottom: 0.5rem;
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 2rem;
  text-align: center;
  margin-bottom: 3rem;
  color: var(--text);
}
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.5rem;
}
.service-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.service-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(139,105,20,0.1); }
.service-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.service-name { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; margin-bottom: 0.5rem; }
.service-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

/* 價目表 */
.pricing-section { background: #f5f0e8; }
.pricing-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.pricing-table th {
  background: #2c2416;
  color: #c4972a;
  padding: 1rem 1.5rem;
  text-align: left;
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
}
.pricing-table td {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.pricing-table tr:last-child td { border-bottom: none; }
.pricing-table tr:hover td { background: #faf8f5; }
.price-tag { color: var(--accent); font-weight: 600; font-size: 1.05rem; }

/* 輪播 */
.carousel { position:relative; width:100%; max-width:480px; margin:0 auto; }
.carousel-track { overflow:hidden; border-radius:14px; }
.carousel-track img { width:100%; height:320px; object-fit:cover; border-radius:14px; display:none; }
.carousel-track img.active { display:block; }
.carousel-btn {
  position:absolute; top:50%; transform:translateY(-50%);
  background:rgba(44,36,22,0.6); color:#faf8f5; border:none;
  width:40px; height:40px; border-radius:50%; font-size:1.4rem;
  cursor:pointer; z-index:2; line-height:1;
}
.carousel-prev { left:-20px; }
.carousel-next { right:-20px; }
.carousel-btn:hover { background:rgba(44,36,22,0.9); }
.carousel-dots { display:flex; justify-content:center; gap:6px; margin-top:10px; }
.carousel-dots span {
  width:8px; height:8px; border-radius:50%;
  background:#c4972a; opacity:0.3; cursor:pointer; transition:opacity 0.2s;
}
.carousel-dots span.active { opacity:1; }
/* 關於我們 */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}
.about-text h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
}
.about-text p {
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 1rem;
  font-size: 0.95rem;
}
.about-img {
  background: linear-gradient(135deg, #e8ddd0, #f5f0e8);
  border-radius: 16px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 0.9rem;
}

/* 聯絡資訊 */
.contact-section { background: #2c2416; color: #faf8f5; }
.contact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2rem;
}
.contact-item h3 {
  font-family: 'Noto Serif TC', serif;
  color: #c4972a;
  margin-bottom: 0.5rem;
  font-size: 1rem;
}
.contact-item p { color: #8b949e; font-size: 0.9rem; line-height: 1.7; }

/* 預約按鈕浮動 */
.booking-float {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--accent);
  color: white;
  padding: 0.9rem 1.8rem;
  border-radius: 50px;
  text-decoration: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  box-shadow: 0 4px 20px rgba(139,105,20,0.4);
  transition: all 0.2s;
  z-index: 99;
}
.booking-float:hover { background: var(--accent-light); transform: translateY(-2px); }

/* 音樂控制按鈕 */
.music-btn {
  position: fixed;
  bottom: 2rem;
  left: 2rem;
  background: #2c2416;
  color: #c4972a;
  border: 1px solid #c4972a;
  padding: 0.6rem 1rem;
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.85rem;
  z-index: 99;
  transition: all 0.2s;
}
.music-btn:hover { background: #3c3426; }

footer {
  background: #1a1208;
  color: #8b949e;
  text-align: center;
  padding: 2rem;
  font-size: 0.85rem;
}

@media (max-width: 700px) {
  .about-grid { grid-template-columns: 1fr; }
  nav .nav-links { display: none; }
}
</style>
</head>
<body>

<audio id="bgMusic" loop></audio>

<!-- 服務說明 Modal -->
<div id="serviceModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,0.65);z-index:999;align-items:center;justify-content:center;
     padding:1rem;box-sizing:border-box;">
  <div style="background:linear-gradient(135deg,#faf8f5,#f5efe3);border-radius:20px;
       padding:2.5rem;max-width:520px;width:100%;position:relative;
       box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:85vh;overflow-y:auto;">
    <button onclick="closeModal()" style="position:absolute;top:1.2rem;right:1.2rem;
            background:rgba(0,0,0,0.08);border:none;font-size:1.1rem;cursor:pointer;

        margin-bottom:1.2rem;font-size:1.6rem;line-height:1.3;"></h3>

         white-space:pre-line;border-top:1px solid rgba(139,105,20,0.2);
         padding-top:1.2rem;"></div>
    <a href="booking.html" style="display:inline-block;margin-top:1.8rem;background:#8b6914;
       color:white;padding:0.8rem 2.2rem;border-radius:10px;text-decoration:none;
       font-size:0.95rem;letter-spacing:0.05em;">立即預約 →</a>
  </div>
</div>

<nav>
  <div class="nav-logo" id="navLogo">七喜經絡推拿</div>
  <div class="nav-links">
    <a href="#services">服務項目</a>

  </div>
</nav>

<section class="hero">
  <div class="hero-tag" id="heroTag">專業推拿養生</div>
  <h1 id="heroTitle">讓身體<span>回歸</span><br>最自然的狀態</h1>

  <div class="hero-btns">

  </div>
</section>

<section id="services">
  <div class="section-inner">
    <div class="section-tag">OUR SERVICES</div>
    <h2 class="section-title">服務項目</h2>
    <div class="services-grid" id="servicesGrid">
      <div class="service-card">
        <div class="service-icon">🌿</div>
        <div class="service-name">載入中...</div>
      </div>
    </div>
  </div>
</section>

<section id="pricing" class="pricing-section">
  <div class="section-inner">

    <h2 class="section-title">價目表</h2>
    <table class="pricing-table">
      <thead>
        <tr>
          <th>服務項目</th>

        </tr>
      </thead>
      <tbody id="pricingBody">
        <tr><td colspan="3" style="text-align:center;color:#9e8e7a">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<section id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div class="about-text">
        <h2>關於我們</h2>
        <p id="aboutText">載入中...</p>
        <a href="booking.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem">立即預約</a>
      </div>
      <div class="about-img" id="aboutImgBox">
        <div class="carousel" id="carousel" style="display:none">
          <button class="carousel-btn carousel-prev" onclick="carouselMove(-1)">&#8249;</button>
          <div class="carousel-track" id="carouselTrack"></div>
          <button class="carousel-btn carousel-next" onclick="carouselMove(1)">&#8250;</button>
          <div class="carousel-dots" id="carouselDots"></div>
        </div>

<section id="contact" class="contact-section">
  <div class="section-inner">
    <div class="section-tag" style="color:#c4972a">CONTACT US</div>
    <h2 class="section-title" style="color:#faf8f5">聯絡資訊</h2>
    <div class="contact-grid">
      <div class="contact-item">
        <h3>📍 地址</h3>
        <p id="contactAddress">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>📞 電話</h3>
        <p id="contactPhone">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>🕐 營業時間</h3>
        <p id="contactHours">載入中...</p>
      </div>
      <div class="contact-item">
        <h3>📅 線上預約</h3>
        <p><a href="booking.html" style="color:#c4972a">點此前往預約系統</a></p>
        </div>
        <p>Line 官方</p>
        <img src="F31A88F4-B619-46B2-803B-1DD1269340AC.png" alt="LINE QR Code" style="width:150px; display:block; margin-top:8px;">
      </div>
    </div>
  </div>
</section>

<footer id="footerText">© 推拿養生館 版權所有</footer>

<a href="booking.html" class="booking-float">📅 立即預約</a>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" style="display:none">🎵 音樂</button>

<script>
var siteData = {};
var musicPlaying = false;

window.onload = function() {
  loadSiteData();
};

function loadSiteData() {
  fetch("site.json?t=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      siteData = data;
      renderSite(data);
    })
    .catch(function() {
      // 沒有 site.json 時顯示預設內容
    });
}

function renderSite(data) {
  var name = data.shop_name || "七喜經絡推拿";
  document.title = name;
  document.getElementById("navLogo").textContent = name;
  document.getElementById("heroTitle").innerHTML = name + "<br><span style='color:var(--accent)'>專業推拿養生</span>";

  if (data.shop_intro) {
    document.getElementById("heroIntro").textContent = data.shop_intro;
    document.getElementById("aboutText").textContent = data.shop_intro;
  }
  if (data.shop_address) {
    var addrEl = document.getElementById("contactAddress");
    if (data.shop_map_url) {
      var mapUrl = data.shop_map_url;
      if (mapUrl && !mapUrl.startsWith("http")) mapUrl = "https://" + mapUrl;
      addrEl.innerHTML = '<a href="' + mapUrl + '" target="_blank" style="color:#c4972a;text-decoration:underline;">' + data.shop_address + ' 📍</a>';
    } else {
      addrEl.textContent = data.shop_address;
    }
  }
  if (data.shop_phone) document.getElementById("contactPhone").textContent = data.shop_phone;
  if (data.shop_hours) document.getElementById("contactHours").textContent = data.shop_hours;
  document.getElementById("footerText").textContent = "© " + "林氏企業:最帥的林" + " 版權所有";

  // 服務項目
  if (data.shop_services && data.shop_services.length > 0) {
    var icons = ["🌿","💆","🏥","✨","🌸","💪","🧘","🌙"];
    var grid = document.getElementById("servicesGrid");
    grid.innerHTML = "";
    data.shop_services.forEach(function(s, i) {
      var name = typeof s === "object" ? (s.name||"") : s;
      var desc = typeof s === "object" ? (s.desc||"") : "";
      var card = document.createElement("div");
      card.className = "service-card";
      card.style.cursor = desc ? "pointer" : "default";
      card.innerHTML = '<div class="service-icon">' + (icons[i % icons.length]) + '</div>' +
                       '<div class="service-name">' + name + '</div>' +
                       (desc ? '<div class="service-hint">點擊了解更多</div>' : "");
      if (desc) {
        card.onclick = function() { showServiceModal(name, desc); };
      }
      grid.appendChild(card);
    });
  }

  // 價目表
  if (data.shop_pricing && data.shop_pricing.length > 0) {
    var tbody = document.getElementById("pricingBody");
    tbody.innerHTML = "";
    data.shop_pricing.forEach(function(p) {
      var tr = document.createElement("tr");
      tr.innerHTML = '<td>' + (p.name||"") + '</td>' +
                     '<td>' + (p.duration||"") + '</td>' +
                     '<td class="price-tag">' + (p.price||"") + '</td>';
      tbody.appendChild(tr);
    });
  }

  // 背景音樂
  if (data.shop_music) {
    var audio = document.getElementById("bgMusic");
    audio.src = data.shop_music;
    document.getElementById("musicBtn").style.display = "block";
  }

  // 店家圖片輪播
  if (data.shop_images && data.shop_images.length > 0) {
    document.getElementById("noImgText").style.display = "none";
    document.getElementById("carousel").style.display = "block";
    var track = document.getElementById("carouselTrack");
    var dots = document.getElementById("carouselDots");
    track.innerHTML = ""; dots.innerHTML = "";
    data.shop_images.forEach(function(url, i) {
      var img = document.createElement("img");
      img.src = url; img.alt = "店家照片 " + (i+1);
      if (i === 0) img.classList.add("active");
      track.appendChild(img);
      var dot = document.createElement("span");
      if (i === 0) dot.classList.add("active");
      dot.onclick = (function(idx){ return function(){ carouselGo(idx); }; })(i);
      dots.appendChild(dot);
    });
    window._carouselIdx = 0;
    if (data.shop_images.length > 1) {
      setInterval(function(){ carouselMove(1); }, 4000);
    }
  }
}

function carouselMove(dir) {
  var imgs = document.querySelectorAll("#carouselTrack img");
  var dots = document.querySelectorAll("#carouselDots span");
  if (!imgs.length) return;
  imgs[window._carouselIdx].classList.remove("active");
  dots[window._carouselIdx].classList.remove("active");
  window._carouselIdx = (window._carouselIdx + dir + imgs.length) % imgs.length;
  imgs[window._carouselIdx].classList.add("active");
  dots[window._carouselIdx].classList.add("active");
}
function carouselGo(idx) {
  var cur = window._carouselIdx;
  var imgs = document.querySelectorAll("#carouselTrack img");
  var dots = document.querySelectorAll("#carouselDots span");
  if (!imgs.length) return;
  imgs[cur].classList.remove("active");
  dots[cur].classList.remove("active");
  window._carouselIdx = idx;
  imgs[idx].classList.add("active");
  dots[idx].classList.add("active");
}

function showServiceModal(name, desc) {
  document.getElementById("modalTitle").textContent = name;
  document.getElementById("modalDesc").innerHTML = desc.replace(/\n/g, "<br>").replace(/。/g, "。<br>");
  document.getElementById("serviceModal").style.display = "flex";
}
function closeModal() {
  document.getElementById("serviceModal").style.display = "none";
}

// 音樂 - 使用者互動後自動播
var musicAutoStarted = false;
function tryAutoPlayMusic() {
  if (musicAutoStarted) return;
  var audio = document.getElementById("bgMusic");
  if (audio && audio.src) {
    audio.play().then(function() {
      musicAutoStarted = true;
      musicPlaying = true;
      var btn = document.getElementById("musicBtn");
      if (btn) btn.textContent = "⏸ 暫停";
    }).catch(function(){});
  }
}
document.addEventListener("click", tryAutoPlayMusic, {once: true});
document.addEventListener("scroll", tryAutoPlayMusic, {once: true});

function toggleMusic() {
  var audio = document.getElementById("bgMusic");
  var btn = document.getElementById("musicBtn");
  if (musicPlaying) {
    audio.pause();
    btn.textContent = "🎵 音樂";
    musicPlaying = false;
  } else {
    audio.play();
    btn.textContent = "⏸ 暫停";
    musicPlaying = true;
  }
}
</script>
</body>
</html>
